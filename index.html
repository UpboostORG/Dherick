document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;\">\n        <sc-for list=\"{{ currencies }}\" as=\"m\" hint-placeholder-count=\"5\">\n          <div style=\"background:#fff;border:1px solid #EAE3D8;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-weight:500;font-size:15px;background:#F4EFE6;width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0;\">{{ m.code }}<\u002Fdiv>\n            <div style=\"flex:1;min-width:0;\"><div style=\"font-size:14px;font-weight:600;\">{{ m.country }}<\u002Fdiv><div style=\"font-size:12px;color:#8A8174;\">{{ m.note }}<\u002Fdiv><\u002Fdiv>\n            <sc-if value=\"{{ m.hasLive }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"text-align:right;flex-shrink:0;\">\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:13.5px;font-weight:600;color:#2F6B45;\">{{ m.live }}<\u002Fdiv>\n                <div style=\"font-size:9.5px;color:#A89A86;text-transform:uppercase;letter-spacing:.06em;\">por 1 {{ m.code }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #EAE3D8;border-radius:14px;padding:8px 4px;\">\n        <sc-for list=\"{{ financeNotes }}\" as=\"n\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;gap:11px;padding:12px 16px;border-bottom:1px solid #F2ECE2;\">\n            <span style=\"color:{{ accent }};margin-top:2px;\">●<\u002Fspan>\n            <div data-path=\"{{ n.path }}\" contenteditable=\"true\" suppresscontenteditablewarning=\"true\" onblur=\"{{ onEditBlur }}\" style=\"flex:1;font-size:13.5px;line-height:1.55;color:#3C372F;\">{{ n.text }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- METAS -->\n    <sc-if value=\"{{ isMetas }}\" hint-placeholder-val=\"{{ false }}\">\n    <div>\n      <div style=\"font-family:'Instrument Serif',serif;font-size:34px;margin-bottom:5px;\">Metas de investimento<\u002Fdiv>\n      <div style=\"font-size:14px;color:#8A8174;margin-bottom:24px;\">Quanto guardar por mês, semana e dia até a partida · ajuste o já investido e a cotação<\u002Fdiv>\n\n      <div style=\"border-radius:18px;padding:24px 26px;background:linear-gradient(135deg,#1F1B16,#2C2620);color:#F4EFE7;margin-bottom:16px;\">\n        <div style=\"display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px;\">\n          <div>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:#C9A57E;text-transform:uppercase;\">Meta total<\u002Fdiv>\n            <div style=\"font-family:'Instrument Serif',serif;font-size:46px;line-height:1;margin-top:6px;color:{{ accent2 }};\">{{ metas.goalUSD }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#B6AC9C;margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;\">≈ {{ metas.goalBRL }} · cotação R$ <input type=\"number\" step=\"0.01\" value=\"{{ metas.rate }}\" oninput=\"{{ onRateInput }}\" style=\"width:64px;font-family:'JetBrains Mono',monospace;font-size:12.5px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:3px 6px;color:#F4EFE7;outline:none;\">/US$<\u002Fdiv>\n            <div style=\"font-size:10.5px;color:#9A9082;margin-top:7px;display:flex;align-items:center;gap:6px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ metas.rateDot }};flex-shrink:0;\"><\u002Fspan>{{ metas.rateNote }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:right;min-width:170px;\">\n            <div style=\"font-size:11px;color:#9A9082;text-transform:uppercase;letter-spacing:.08em;\">Já investido<\u002Fdiv>\n            <div style=\  ...g,\n      items: g.items.map(it => {\n        const saved = editIndex[g.city + '|' + it.name];\n        return (saved != null && saved !== it.desc) ? { ...it, desc: saved } : { ...it };\n      }),\n    }));\n    return data;\n  }\n\n  componentDidMount() {\n    this._timer = setInterval(() => this.tick(), 1000);\n    this.fetchRate();\n    this._rateTimer = setInterval(() => this.fetchRate(), 1800000);\n  }\n\n  fetchRate = async () => {\n    try {\n      const r = await fetch('https://open.er-api.com/v6/latest/BRL');\n      const j = await r.json();\n      const rates = j && j.rates;\n      if (rates && rates.USD) {\n        const per = (code) => (rates[code] ? 1 / rates[code] : null); // R$ por 1 unidade\n        const usd = per('USD');\n        this.setState(s => ({\n          data: { ...s.data, savings: { ...(s.data.savings || {}), rate: usd } },\n          liveRates: { USD: usd, EUR: per('EUR'), TRY: per('TRY'), AED: per('AED'), MKD: per('MKD') },\n          rateStatus: 'auto', rateTime: new Date(),\n        }), this.save);\n      } else {\n        this.setState({ rateStatus: 'erro' });\n      }\n    } catch (e) {\n      this.setState({ rateStatus: 'erro' });\n    }\n  };\n  componentWillUnmount() {\n    if (this._timer) clearInterval(this._timer);\n    if (this._rateTimer) clearInterval(this._rateTimer);\n  }\n\n  save = () => {\n    try { localStorage.setItem(KEY, JSON.stringify(this.state.data)); } catch (e) {}\n  };\n\n  computeCountdown() {\n    const target = new Date(this.state.data.startDate + 'T02:00:00-04:00').getTime();\n    let diff = Math.max(0, target - Date.now());\n    const days = Math.floor(diff / 86400000); diff -= days * 86400000;\n    const hours = Math.floor(diff / 3600000); diff -= hours * 3600000;\n    const mins = Math.floor(diff / 60000); diff -= mins * 60000;\n    const secs = Math.floor(diff / 1000);\n    const p = (n) => String(n).padStart(2, '0');\n    return { days, hours:p(hours), mins:p(mins), secs:p(secs) };\n  }\n\n  tick( t.filter(c => !c.done).length;\n    const sections = SECTIONS.map(s => ({\n      id: s.id, label: s.label,\n      bg: sec === s.id ? '#1B1916' : 'transparent',\n      fg: sec === s.id ? '#FCFAF6' : '#4A453D',\n      weight: sec === s.id ? 600 : 500,\n      dot: sec === s.id ? accent2 : '#CFC6B7',\n      showBadge: s.id === 'checklist' && pendCount > 0,\n      badge: pendCount,\n    }));\n\n    const total = d.checklist.length;\n    const done = d.checklist.filter(c => c.done).length;\n    const pct = total ? Math.round(done / total * 100) : 0;\n    const progress = { done, total, pct, pctText: pct + '%' };\n\n    const critCount = d.checklist.filter(c => !c.done && c.urgency === 'CRÍTICO').length;\n\n    const order = { 'CRÍTICO':0, 'ALTA':1, 'MÉDIA':2, 'BAIXA':3, 'OK':4 };\n    const topPending = d.checklist.filter(c => !c.done)\n      .sort((a, b) => (order[a.urgency] ?? 9) - (order[b.urgency] ?? 9))\n      .slice(0, 5)\n      .map(c => { const t = this.toneOf(c.urgency, false); return { text:c.text, urgency:c.urgency, tc:t.c, tb:t.b }; });\n\n    const routeRaw = [\n      { code:'CGB', label:'Cuiabá' }, { code:'GRU', label:'São Paulo' },\n      { code:'DXB', label:'Dubai' }, { code:'CAI', label:'Cairo' },\n      { code:'ATH', label:'Atenas' }, { code:'GR', label:'Ilhas' },\n      { code:'TR', label:'Turquia' }, { code:'MK', label:'Macedônia' },\n    ];\n    const confirmedCodes = ['CGB','GRU','DXB','CAI','ATH'];\n    const routePills = routeRaw.map((r, i) => {\n      const conf = confirmedCodes.includes(r.code);\n      return {\n        code: r.code, label: r.label, arrow: i < routeRaw.length - 1,\n        border: conf ? '#CFE0D4' : '#E6DACB',\n        bg: conf ? '#EFF5F0' : '#FBF6EE',\n        fg: conf ? '#2F6B45' : '#9A6A2E',\n      };\n    });\n\n    const itinerary = d.itinerary.map((it, i) => {\n      const t = TONE[it.tone] || TONE.med;\n      return { ...it, tc:t.c, tb:t.b, notePath:'itinerary.' + i + '.note' };\n    });\n\n    const flightsConfirmed = d.f .length, label:(x)=> x + ' hospedagens a reservar', tone:'high' },\n      { n: pend.filter(c => /passagem/i.test(c.text)).length, label:(x)=> x + ' passagens a comprar', tone:'high' },\n      { n: pend.filter(c => /seguro/i.test(c.text)).length, label:()=> 'Seguro viagem', tone:'high' },\n      { n: pend.filter(c => /visto|e-visa/i.test(c.text)).length, label:()=> 'E-visa Turquia', tone:'med' },\n    ];\n    const prepaySummary = pm.filter(x => x.n > 0).map(x => { const t = TONE[x.tone]; return { label:x.label(x.n), tc:t.c, tb:t.b }; });\n    const allOk = prepaySummary.length === 0;\n    if (allOk) prepaySummary.push({ label:'Tudo pago ✓', tc:TONE.ok.c, tb:TONE.ok.b });\n\n    // ---- Metas de investimento ----\n    const fmtBRL = (n) => 'R$ ' + Math.round(Number(n) || 0).toLocaleString('pt-BR');\n    const goalUSD = budgetTotal;\n    const savedUSD = Number(d.savings && d.savings.saved) || 0;\n    const rate = Number(d.savings && d.savings.rate) || 5.40;\n    const remUSD = Math.max(0, goalUSD - savedUSD);\n    const targetMs = new Date(d.startDate + 'T02:00:00-04:00').getTime();\n    const daysLeft = Math.max(1, Math.ceil((targetMs - Date.now()) / 86400000));\n    const weeksLeft = daysLeft / 7;\n    const monthsLeft = daysLeft / 30.44;\n    const remBRL = remUSD * rate;\n    const savedPct = goalUSD ? Math.min(100, Math.round(savedUSD / goalUSD * 100)) : 0;\n    const metas = {\n      goalUSD: fmt(goalUSD), goalBRL: fmtBRL(goalUSD * rate),\n      savedUSD, savedBRL: fmtBRL(savedUSD * rate),\n      remUSD: fmt(remUSD), remBRL: fmtBRL(remBRL),\n      rate: rate.toFixed(2),\n      daysLeft, weeksLabel: Math.max(1, Math.round(weeksLeft)), monthsLabel: monthsLeft.toFixed(1),\n      perMonth: fmtBRL(remBRL / monthsLeft), perWeek: fmtBRL(remBRL / weeksLeft), perDay: fmtBRL(remBRL / daysLeft),\n      perMonthUSD: fmt(Math.round(remUSD / monthsLeft)),\n      savedPct, savedPctText: savedPct + '%',\n      reached: savedUSD >= goalUSD,\n      rateDot: this.state.rateStatus === 'auto' ? '#2F6B45' : (this.state.rateStatus === 'erro' ? '#B0631F' : '#A89A86'),\n      rateNote: this.state.rateStatus === 'auto'\n        ? ('Cotação automática · atualizada ' + (this.state.rateTime ? this.state.rateTime.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }) : 'agora'))\n        : (this.state.rateStatus === 'erro' ? 'Cotação manual (não foi possível buscar online)' : 'Buscando cotação do dia…'),\n    };\n\n    // ---- Compras mês a mês ----\n    const purchasePlan = (d.purchasePlan || []).map((m, mi) => {\n      const items = (m.items || []).map((it, ii) => {\n        const t = TONE[it.tone] || TONE.med;\n        return {\n          task: it.task, cost: it.cost, done: it.done, tc: t.c, tb: t.b,\n          deco: it.done ? 'line-through' : 'none', op: it.done ? 0.5 : 1, mi, ii,\n          taskPath: 'purchasePlan.' + mi + '.items.' + ii + '.task',\n          costPath: 'purchasePlan.' + mi + '.items.' + ii + '.cost',\n        };\n      });\n      const doneN = (m.items || []).filter(x => x.done).length;\n      const tot = (m.items || []).length;\n      return { month: m.month, note: m.note, items, doneN, total: tot, pctText: tot ? Math.round(doneN / tot * 100) + '%' : '0%' };\n    });\n\n    const lr = this.state.liveRates;\n    const currencies = d.currencies.map(m => {\n      const v = lr && lr[m.code];\n      return {\n        ...m,\n        hasLive: !!v,\n        live: v ? ('R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })) : null,\n      };\n    });\n\n    const f = this.state.filter;\n    const passFilter = (c) => {\n      if (f === 'all') return true;\n      if (f === 'pend') return !c.done;\n      if (f === 'crit') return c.urgency === 'CRÍTICO';\n      if (f === 'high') return c.urgency === 'ALTA';\n      if (f === 'done') return c.done;\n      return true;\n    };\n    const checklistView = d.checklist.filter(passFilter).map(c => {\n      const t = this.toneOf(c.urgency, c.done);\n      return {\n        id:c.id, text:c.text, done:c.done, urgency:c.urgency,\n        tc:t.c, tb:t.b,\n        op: c.done ? 0.55 : 1,\n        deco: c.done ? 'line-through' : 'none',\n        textColor: c.done ? '#9A9082' : '#1B1916',\n      };\n    });\n    const filters = [\n      { id:'all',  label:'Todos',     count:d.checklist.length },\n      { id:'pend', label:'Pendentes', count:d.checklist.filter(c=>!c.done).length },\n      { id:'crit', label:'Críticos',  count:d.checklist.filter(c=>c.urgency==='CRÍTICO').length },\n      { id:'high', label:'Altas',     count:d.checklist.filter(c=>c.urgency==='ALTA').length },\n      { id:'done', label:'Concluídos',count:done },\n    ].map(x => ({\n      ...x,\n      border: f === x.id ? '#1B1916' : '#E2DACC',\n      bg: f === x.id ? '#1B1916' : '#fff',\n      fg: f === x.id ? '#fff' : '#4A453D',\n    }));\n\n    return {\n      sections, accent, accent2, accentBg, showSeconds,\n      isVisao: sec==='visao', isRoteiro: sec==='roteiro', isPasseios: sec==='passeios', isVoos: sec==='voos',\n      spots,\n      budgetTotal, allocations, allocSumText: fmt(allocSum), allocPctText: allocPct + '%',\n      remColor, remLabel, prepaySummary,\n      onBudgetTotal:this.onBudgetTotal, onAllocAmount:this.onAllocAmount,\n      isHospedagem: sec==='hospedagem', isDocumentos: sec==='documentos',\n      isVacinas: sec==='vacinas', isChecklist: sec==='checklist', isFinanceiro: sec==='financeiro',\n      isMetas: sec==='metas', isCompras: sec==='compras',\n      metas, purchasePlan,\n      onSavedInput:this.onSavedInput, onRateInput:this.onRateInput, onPurchaseToggle:this.onPurchaseToggle,\n      countdown: this.computeCountdown(),\n      refDays:this._setRd, refHours:this._setRh, refMins:this._setRm, refSecs:this._setRs, refNew:this._setNew,\n      startDate: d.startDate,\n      progress, critCount, topPending, routePills, itinerary,\n      flightsConfirmed, flightsToBuy, lodgingMissing, vistos,\n      docsHave: d.docsHave, vacinasOk: d.vacinasOk, vacinasRec,\n      currencies, financeNotes, checklistView, filters,\n      onNav:this.onNav, onFilter:this.onFilter, onChangeStart:this.onChangeStart,\n      onEditBlur:this.onEditBlur, onToggle:this.onToggle, onDelete:this.onDelete,\n      addItem:this.addItem, onAddKey:this.onAddKey,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
